<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Prospectar empresas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:680px;margin:40px auto;padding:0 16px;line-height:1.4}
    code{background:#f3f3f3;padding:2px 6px;border-radius:4px}
    .box{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:16px}
    .btn{display:inline-block;background:#111;color:#fff;padding:10px 14px;border-radius:8px;text-decoration:none}
    .btn:hover{opacity:.9}
    input,select{padding:8px;border:1px solid #ddd;border-radius:6px;width:100%}
    label{font-weight:600;margin-top:12px;display:block}
  </style>
</head>
<body>
  <h1>Prospectar empresas para la base</h1>
  <p>Arrastra este botón a tu barra de marcadores y úsalo estando en la web de una empresa:</p>
  <p>
    <a class="btn" id="bm" href="#">Añadir empresa</a>
  </p>

  <div class="box">
    <h2>Configurar criterios por defecto</h2>
    <p>Estos valores se enviarán por defecto cuando uses el bookmarklet (podrás cambiarlos en el prompt):</p>
    <label>Sector</label>
    <input id="sector" placeholder="p.ej. Desarrollo web, Software, Ciberseguridad">
    <label>Provincia</label>
    <input id="provincia" placeholder="p.ej. Málaga">
    <label>Ciudad</label>
    <input id="ciudad" placeholder="p.ej. Málaga">
    <p><button class="btn" id="guardar">Guardar en el navegador</button></p>
  </div>

  <script>
    const ENDPOINT = location.origin + '/api/empresas/capturar_desde_web.php';

    function makeBookmarklet() {
      const defaults = {
        sector: localStorage.getItem('pros_sector') || '',
        provincia: localStorage.getItem('pros_prov') || '',
        ciudad: localStorage.getItem('pros_ciudad') || ''
      };
      const code = `(function(){
        const ep='${ENDPOINT}';
        const d=document;
        const html=d.documentElement.outerHTML;
        const url=location.href;

        const sec=prompt('Sector (ENTER para usar el guardado):','${defaults.sector}');
        const prov=prompt('Provincia (ENTER para usar la guardada):','${defaults.provincia}');
        const ciu=prompt('Ciudad (ENTER para usar la guardada):','${defaults.ciudad}');

        fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            url:url,
            html:html,
            criterios:{sector:sec||'${defaults.sector}', provincia:prov||'${defaults.provincia}', ciudad:ciu||'${defaults.ciudad}'}
          })
        }).then(r=>r.json()).then(j=>{
          if(j.ok){alert('Empresa '+j.accion+' (ID '+j.id+'): '+(j.empresa.nombre||'(sin nombre)')); }
          else {alert('Error: '+j.error);}
        }).catch(e=>alert('Fallo de red: '+e.message));
      })();`;

      return 'javascript:' + encodeURIComponent(code);
    }

    const bm = document.getElementById('bm');
    bm.setAttribute('href', makeBookmarklet());

    document.getElementById('guardar').onclick = () => {
      localStorage.setItem('pros_sector',  (document.getElementById('sector').value||'').trim());
      localStorage.setItem('pros_prov',    (document.getElementById('provincia').value||'').trim());
      localStorage.setItem('pros_ciudad',  (document.getElementById('ciudad').value||'').trim());
      bm.setAttribute('href', makeBookmarklet());
      alert('Guardado. Vuelve a arrastrar el botón si quieres actualizar el bookmarklet.');
    };
  </script>
</body>
</html>
